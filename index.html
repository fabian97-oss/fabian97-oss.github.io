<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Multiplayer Schach</title>

<!-- Chessground CSS -->
<link rel="stylesheet" href="https://unpkg.com/chessground@7.0.0/dist/chessground.min.css">

<style>
body { font-family: Arial, sans-serif; text-align: center; margin-top: 30px; }
#board { width: 400px; height: 400px; margin: 20px auto; }
input { padding: 5px; font-size: 14px; width: 150px; }
button { padding: 5px 10px; font-size: 14px; margin-left: 5px; }
#status { margin-top: 20px; font-weight: bold; color: green; }
</style>
</head>
<body>

<h1>Test Multiplayer Schach</h1>

<div id="board"></div>

<div>
  <input id="gameId" placeholder="Spiel ID eingeben">
  <button onclick="joinGame()">Spiel beitreten</button>
</div>

<div id="status"></div>

<!-- Bibliotheken -->
<script src="https://unpkg.com/chessground@7.0.0/dist/chessground.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
// ----------------------------
// Firebase Config einfügen
// ----------------------------
const firebaseConfig = {
  apiKey: "AIzaSyAFICoiUOuH7csjX1kyI1OqGtM6GS8vfBU",
  authDomain: "schach-online-25607.firebaseapp.com",
  databaseURL: "https://schach-online-25607-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "schach-online-25607"
};


firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ----------------------------
// Globale Variablen
// ----------------------------
let board;
let currentGame = "";

// ----------------------------
// Chessground Brett initialisieren
// ----------------------------
board = Chessground(document.getElementById("board"), {
  draggable: false,
  orientation: 'white'
});

// ----------------------------
// Spiel beitreten / erstellen
// ----------------------------
function joinGame() {
  let input = document.getElementById("gameId").value.trim();
  if(!input) {
    alert("Bitte eine Spiel-ID eingeben!");
    return;
  }
  currentGame = input;

  const playersRef = db.ref("games/" + currentGame + "/players");
  const myId = Math.random().toString(36).substring(2,8);

  // Eigenen Spieler registrieren
  playersRef.child(myId).set(true);

  // Wenn Spieler die Seite verlassen, entfernen
  playersRef.child(myId).onDisconnect().remove();

  // Auf Veränderungen hören
  playersRef.on('value', snapshot => {
    const count = snapshot.numChildren();
    if(count >= 2) {
      document.getElementById("status").innerText = "Beide Spieler bereit!";
    } else {
      document.getElementById("status").innerText = "Warte auf zweiten Spieler...";
    }
  });
}
</script>

</body>
</html>
