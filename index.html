<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Online Schach Multiplayer</title>

<!-- Chessboard.js CSS -->
<link rel="stylesheet"
href="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

<style>
body { font-family: Arial, sans-serif; text-align: center; margin-top: 30px; }
#board { width: 400px; margin: 20px auto; }
input { padding: 5px; font-size: 14px; width: 120px; }
button { padding: 5px 10px; font-size: 14px; margin-left: 5px; }
</style>
</head>
<body>

<h1>Online Schach Multiplayer</h1>

<div id="board"></div>

<div>
  <input id="gameId" placeholder="Spiel ID (optional)">
  <button onclick="joinGame()">Spiel beitreten</button>
</div>

<!-- jQuery für Chessboard.js -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<!-- Chess.js (Browser Version) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>

<!-- Chessboard.js -->
<script src="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<!-- App.js -->
<script src="app.js"></script>

</body>
</html>
