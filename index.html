<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Online Schach</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:900px;margin:30px auto;padding:10px;text-align:center}
    h1{margin-bottom:6px}
    .card{border:1px solid #ddd;padding:18px;border-radius:8px;margin:12px auto}
    .row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
    input[type=text]{padding:8px;font-size:15px;border:1px solid #ccc;border-radius:6px;width:220px}
    button{padding:9px 14px;border-radius:6px;border:0;background:#0b67ff;color:#fff;cursor:pointer}
    button.secondary{background:#6c757d}
    #board{width:480px;height:480px;margin:16px auto}
    #status{margin-top:8px;font-weight:600}
    #vs{margin-top:10px;font-weight:700}
    #lobby,#game{display:none}
    .note{font-size:13px;color:#666;margin-top:8px}
    .error{color:#b00020;font-weight:700;margin-top:10px}
  </style>
</head>
<body>
  <h1>Online Schach</h1>

  <!-- LOBBY: Code + Name + Beitreten -->
  <div id="lobby" class="card">
    <div class="row">
      <input id="gameCode" type="text" placeholder="Spiel-Code eingeben" />
      <button id="joinBtn">Spiel betreten</button>
    </div>
    <div class="row" style="margin-top:8px">
      <input id="playerName" type="text" placeholder="Dein Name (z. B. Anna)" />
    </div>
    <div id="lobbyInfo" class="note">Gib Spiel-Code und deinen Namen ein. Wenn Ressourcen von CDNs blockiert werden, erlauben/whitelisten (Tracking Protection) oder probiere anderes Netzwerk.</div>
    <div id="libError" class="error" style="display:none;"></div>
  </div>

  <!-- GAME: Spielerstatus, Board und Controls -->
  <div id="game" class="card">
    <div id="status">Warte...</div>
    <div id="vs">- vs -</div>

    <div id="board"></div>

    <div style="margin-top:8px">
      <button id="leaveBtn" class="secondary">Spiel verlassen</button>
    </div>
  </div>

  <!-- Firebase compat (leave as-is, still required) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <script>
  // ---------- Robust loader for external libs (tries multiple CDNs) ----------
  const CSS_CANDIDATES = [
    'https://cdn.jsdelivr.net/npm/chessground@7.0.0/dist/chessground.min.css',
    'https://unpkg.com/chessground@7.0.0/dist/chessground.min.css'
  ];
  const JS_CANDIDATES = {
    chessground: [
      'https://cdn.jsdelivr.net/npm/chessground@7.0.0/dist/chessground.min.js',
      'https://unpkg.com/chessground@7.0.0/dist/chessground.min.js'
    ],
    chessjs: [
      'https://cdn.jsdelivr.net/npm/chess.js@1.0.0/chess.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js',
      'https://unpkg.com/chess.js@1.0.0/chess.min.js'
    ]
  };

  function loadCssSequential(urls) {
    return new Promise((resolve) => {
      let idx = 0;
      function tryNext() {
        if (idx >= urls.length) { resolve(false); return; }
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = urls[idx++];
        link.onload = () => resolve(true);
        link.onerror = () => {
          // try next URL
          tryNext();
        };
        document.head.appendChild(link);
      }
      tryNext();
    });
  }

  function loadScriptSequential(urls, testGlobalName, timeoutMs = 8000) {
    return new Promise((resolve, reject) => {
      let idx = 0;
      let timedOut = false;
      function tryNext() {
        if (timedOut) return;
        if (typeof window[testGlobalName] !== 'undefined') { resolve(true); return; }
        if (idx >= urls.length) { resolve(false); return; }
        const url = urls[idx++];
        const s = document.createElement('script');
        s.src = url;
        s.async = false;
        let done = false;
        s.onload = () => {
          // small delay to allow global to be set
          setTimeout(() => {
            if (typeof window[testGlobalName] !== 'undefined') {
              done = true;
              resolve(true);
            } else {
              // maybe this CDN didn't provide the expected global
              if (!done) tryNext();
            }
          }, 50);
        };
        s.onerror = () => {
          if (!done) tryNext();
        };
        document.head.appendChild(s);

        // safety timeout for this attempt
        setTimeout(() => {
          if (typeof window[testGlobalName] !== 'undefined') { resolve(true); return; }
          // proceed to next candidate
          tryNext();
        }, timeoutMs);
      }
      tryNext();
    });
  }

  async function ensureLibraries() {
    // try CSS first (non-blocking)
    await loadCssSequential(CSS_CANDIDATES);

    // then try JS libs
    const chessgroundLoaded = await loadScriptSequential(JS_CANDIDATES.chessground, 'Chessground');
    const chessjsLoaded = await loadScriptSequential(JS_CANDIDATES.chessjs, 'Chess');

    return { chessgroundLoaded, chessjsLoaded };
  }

  // ---------- App code ----------
  document.addEventListener('DOMContentLoaded', async () => {
    const libStatus = document.getElementById('libError');
    const { chessgroundLoaded, chessjsLoaded } = await ensureLibraries();

    if (!chessgroundLoaded || !chessjsLoaded) {
      libStatus.style.display = 'block';
      libStatus.innerText = 'Fehler: Externe Bibliotheken konnten nicht geladen werden. Bitte Tracking-Protection/Adblocker für die Domain deaktivieren oder CDN-Hosts (jsdelivr, unpkg, cdnjs) erlauben.';
      // allow user to still try to continue, but disable join button
      document.getElementById('joinBtn').disabled = true;
      return;
    }

    // now safe to run the app
    // -----------------------
    // Firebase-Konfiguration: hier eigene Werte eintragen
    // -----------------------
    const firebaseConfig = {
        apiKey: "AIzaSyAFICoiUOuH7csjX1kyI1OqGtM6GS8vfBU",
        authDomain: "schach-online-25607.firebaseapp.com",
        databaseURL: "https://schach-online-25607-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "schach-online-25607"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // UI
    const lobbyEl = document.getElementById('lobby');
    const gameEl  = document.getElementById('game');
    const statusEl = document.getElementById('status');
    const vsEl = document.getElementById('vs');
    const boardEl = document.getElementById('board');
    const gameCodeInput = document.getElementById('gameCode');
    const playerNameInput = document.getElementById('playerName');
    const joinBtn = document.getElementById('joinBtn');
    const leaveBtn = document.getElementById('leaveBtn');

    // State
    let myId = null;
    let mySlot = null; // 'player1' oder 'player2'
    let myColor = null; // 'white' oder 'black'
    let currentGameId = null;
    let playersRef = null;
    let gameRef = null; // root for game data
    let cg = null;      // chessground instance
    let chess = null;   // chess.js instance
    let listenersAttached = false;

    // Show lobby
    lobbyEl.style.display = 'block';

    // UI update
    function updateGameUI(players, fen) {
      const p1 = players && players.player1 ? players.player1.name : null;
      const p2 = players && players.player2 ? players.player2.name : null;
      vsEl.innerText = `${p1 || '-'}  vs  ${p2 || '-'}`;

      const count = (p1 ? 1:0) + (p2?1:0);
      if (mySlot) {
        const slotNumber = mySlot === 'player1' ? '1/2' : '2/2';
        if (count >= 2) statusEl.innerText = `${slotNumber} ready`;
        else statusEl.innerText = `${slotNumber} — warte auf zweiten Spieler...`;
      } else {
        statusEl.innerText = `${count}/2`;
      }

      if (fen && cg && chess) {
        if (chess.fen() !== fen) {
          chess.load(fen);
          cg.set({fen: fen});
        }
      }
    }

    // attach listeners
    function attachListeners() {
      if (!gameRef || listenersAttached) return;
      listenersAttached = true;

      playersRef.on('value', snap => {
        const players = snap.val() || {};
        gameRef.child('fen').once('value').then(s => {
          const fen = s.val() || null;
          updateGameUI(players, fen);
        });
      });

      gameRef.child('fen').on('value', snap => {
        const fen = snap.val();
        if (!fen || !chess) return;
        if (chess.fen() !== fen) {
          chess.load(fen);
          cg.set({fen: fen});
        }
      });
    }

    // init local board
    function initLocalBoard(initialFen) {
      chess = new Chess();
      if (initialFen) chess.load(initialFen);

      // Destroy previous instance if exists
      if (cg && typeof cg.destroy === 'function') cg.destroy();
      else if (cg && typeof cg.stop === 'function') cg.stop();
      cg = Chessground(boardEl, {
        fen: chess.fen(),
        orientation: myColor || 'white',
        movable: {
          color: myColor || 'white',
          free: false,
          events: {
            after: (orig, dest) => {
              if (!chess) return;
              const turn = chess.turn() === 'w' ? 'white' : 'black';
              if (turn !== myColor) {
                // not our turn -> reload server state
                gameRef.child('fen').once('value').then(s => {
                  const fen = s.val();
                  if (fen) {
                    chess.load(fen);
                    cg.set({fen: fen});
                  }
                });
                return;
              }

              const move = chess.move({from: orig, to: dest, promotion: 'q'});
              if (!move) {
                // invalid -> reload
                cg.set({fen: chess.fen()});
                return;
              }

              const newFen = chess.fen();
              gameRef.child('fen').set(newFen).catch(err => {
                // revert on error by reloading server fen
                console.error('DB write failed', err);
                gameRef.child('fen').once('value').then(s => {
                  const fen = s.val();
                  if (fen) {
                    chess.load(fen);
                    cg.set({fen: fen});
                  }
                });
              });
            }
          }
        },
        animation: {enabled: true}
      });
    }

    // join logic
    joinBtn.addEventListener('click', () => {
      const gameId = String(gameCodeInput.value||'').trim();
      const name = String(playerNameInput.value||'').trim() || 'Spieler';
      if (!gameId) { alert('Bitte Spiel-Code eingeben.'); return; }

      myId = Math.random().toString(36).substring(2,9);
      currentGameId = gameId;
      playersRef = db.ref('games/' + currentGameId + '/players');
      gameRef = db.ref('games/' + currentGameId);

      playersRef.transaction(current => {
        if (current === null) {
          return { player1: { id: myId, name: name } };
        } else {
          if (!current.player1) {
            current.player1 = { id: myId, name: name };
            return current;
          } else if (!current.player2 && current.player1.id !== myId) {
            current.player2 = { id: myId, name: name };
            return current;
          } else if (current.player1 && current.player1.id === myId) {
            current.player1.name = name; return current;
          } else if (current.player2 && current.player2.id === myId) {
            current.player2.name = name; return current;
          } else {
            return; // both occupied
          }
        }
      }, (err, committed, snapshot) => {
        if (err) { alert('Fehler: ' + err.message); return; }
        if (!committed) { alert('Spiel ist bereits voll.'); return; }

        const players = snapshot.val() || {};
        if (players.player1 && players.player1.id === myId) mySlot = 'player1';
        else if (players.player2 && players.player2.id === myId) mySlot = 'player2';
        else { alert('Konnte keinen Slot zuweisen.'); return; }

        myColor = mySlot === 'player1' ? 'white' : 'black';

        // onDisconnect cleanup
        playersRef.child(mySlot).onDisconnect().remove();

        // Ensure fen exists (transactionally)
        gameRef.child('fen').transaction(f => {
          if (!f) {
            const tempChess = new Chess();
            return tempChess.fen();
          }
          return f;
        }).then(() => {
          // switch UI
          lobbyEl.style.display = 'none';
          gameEl.style.display = 'block';

          // initialize local board (will be kept in sync by listeners)
          initLocalBoard();

          attachListeners();
        }).catch(e => {
          console.error(e);
          alert('Fehler beim Initialisieren des Spiels.');
        });
      });
    });

    // leave
    leaveBtn.addEventListener('click', () => {
      if (playersRef && mySlot) {
        playersRef.child(mySlot).remove().then(() => resetLocalState());
      } else resetLocalState();
    });

    function resetLocalState(){
      if (playersRef) playersRef.off();
      if (gameRef) gameRef.child('fen').off();
      listenersAttached = false;
      myId = null; mySlot = null; myColor = null; currentGameId = null; playersRef = null; gameRef = null;
      if (cg) {
        if (typeof cg.destroy === 'function') cg.destroy();
        else if (typeof cg.stop === 'function') cg.stop();
        cg = null;
      }
      chess = null;
      gameEl.style.display = 'none';
      lobbyEl.style.display = 'block';
      statusEl.innerText = 'Warte...';
      vsEl.innerText = '- vs -';
      gameCodeInput.value = '';
    }

    // End of app
  }); // DOMContentLoaded
  </script>
</body>
</html>
