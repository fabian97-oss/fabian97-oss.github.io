<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Online Schach Multiplayer</title>

<!-- Chessground CSS -->
<link rel="stylesheet" href="https://unpkg.com/chessground@7.0.0/dist/chessground.min.css">

<style>
body { font-family: Arial, sans-serif; text-align: center; margin-top: 30px; }
#board { width: 400px; height: 400px; margin: 20px auto; }
input { padding: 5px; font-size: 14px; width: 120px; }
button { padding: 5px 10px; font-size: 14px; margin-left: 5px; }
</style>
</head>
<body>

<h1>Online Schach Multiplayer</h1>

<div id="board"></div>

<div>
  <input id="gameId" placeholder="Spiel ID (optional)">
  <button onclick="joinGame()">Spiel beitreten</button>
</div>

<!-- Bibliotheken -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>
<script src="https://unpkg.com/chessground@7.0.0/dist/chessground.min.js"></script>

<!-- Firebase v9 compat (funktioniert global) -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
// ----------------------------
// Globale Variablen
// ----------------------------
let board;
let currentGame = "";
let myColor = "white";
const game = new Chess();

// ----------------------------
// Firebase Config einfügen
// ----------------------------
const firebaseConfig = {
  apiKey: "AIzaSyAFICoiUOuH7csjX1kyI1OqGtM6GS8vfBU",
  authDomain: "schach-online-25607.firebaseapp.com",
  databaseURL: "https://schach-online-25607-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "schach-online-25607"
};

// Firebase initialisieren
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ----------------------------
// Chessground Brett initialisieren
// ----------------------------
board = Chessground(document.getElementById("board"), {
  draggable: true,
  orientation: 'white',
  highlight: true,
  turnColor: 'white',
  movable: {
    free: false,
    color: 'white',
    showDests: true,
    events: { after: onMove }
  }
});

// ----------------------------
// Spiel beitreten / erstellen
// ----------------------------
function joinGame() {
  let input = document.getElementById("gameId").value;
  if(!input) input = Math.random().toString(36).substring(2,8);
  currentGame = input;

  // Spielerfarbe zufällig zuweisen
  myColor = Math.random() > 0.5 ? "white" : "black";
  board.setOrientation(myColor);
  board.state.movable.color = myColor;

  // Moves vom Server hören
  listenMoves();

  alert(`Du spielst ${myColor}. Spiel-ID: ${currentGame}`);
}

// ----------------------------
// Eigene Züge ausführen und senden
// ----------------------------
function onMove(from, to) {
  const move = game.move({from, to, promotion: 'q'});
  if(!move) return false;

  db.ref("games/" + currentGame + "/moves").push({
    from: from,
    to: to,
    color: myColor
  });

  return true;
}

// ----------------------------
// Züge vom Server empfangen
// ----------------------------
function listenMoves() {
  const movesRef = db.ref("games/" + currentGame + "/moves");
  movesRef.on('child_added', (data) => {
    const move = data.val();
    if(move.color !== myColor) {
      const legalMove = game.move({from: move.from, to: move.to, promotion: 'q'});
      if(legalMove) board.move(legalMove.from + '-' + legalMove.to);

      if(game.isCheckmate()) alert("Schachmatt!");
      if(game.isDraw()) alert("Unentschieden!");
    }
  });
}
</script>

</body>
</html>
